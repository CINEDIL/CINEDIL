<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrative | Adil Husain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');
        
        :root { --bg: #0b0b0b; --text: #eee; --text-muted: #888; --blue: #3b82f6; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; position: relative; overflow-x: hidden; }
        
        /* ANIMATED MOVING TV STATIC GRAIN */
        body::after {
            content: ""; 
            position: fixed; 
            top: -150%; left: -150%; width: 400vw; height: 400vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.035; 
            pointer-events: none; 
            z-index: 9999;
            animation: tvStatic 0.4s steps(1) infinite;
        }

        @keyframes tvStatic {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -20%); }
            40% { transform: translate(-5%, 20%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 15%); }
            80% { transform: translate(3%, 25%); }
            90% { transform: translate(-10%, 10%); }
        }
        
        a { text-decoration: none; color: inherit; }

        .back-btn { position: fixed; top: 40px; left: 40px; font-size: 10px; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 40px; color: #ccc; z-index: 10000; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: 0.3s;}
        .back-btn:hover { background: #fff; color: #000; }

        .header-spacer { padding-top: 150px; }

        /* FEATURE FILM SECTION STYLING (Based on Reference) */
        .film-section { text-align: center; margin-bottom: 120px; padding: 0 5%; }
        .film-title { font-size: 2.5rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .film-role { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #888; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px; }

        /* 2-COLUMN ZERO GAP GRID FOR BHAASH */
        .tight-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; width: 100%; max-width: 1600px; margin: 0 auto; background: #000; position: relative; z-index: 10; }
        .tight-grid img { width: 100%; aspect-ratio: 2.35/1; object-fit: cover; display: block; filter: brightness(0.85); transition: filter 0.4s; cursor: crosshair; }
        .tight-grid img:hover { filter: brightness(1.1); z-index: 2; position: relative; }

        /* LARGE SINGLE MEDIA CONTAINER FOR OTHER FILMS */
        .large-media { width: 100%; max-width: 1400px; aspect-ratio: 16/9; margin: 0 auto; background: #111; position: relative; overflow: hidden; z-index: 10; }
        .large-media img, .large-media iframe { width: 100%; height: 100%; object-fit: cover; border: none; }
        
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; transition: 0.3s; opacity: 0; }
        .large-media:hover .play-overlay { opacity: 1; }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; padding-left: 5px; }

        /* MULTI-VIDEO GRID FOR SHORTS */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10;}
        .video-wrapper { aspect-ratio: 16/9; background: #111; }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }

        /* DIVIDER */
        .divider { width: 100%; max-width: 1400px; margin: 0 auto 120px; border: none; border-top: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 900px) { 
            .tight-grid { grid-template-columns: 1fr; } 
            .film-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
