<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adil Husain | Director & Cinematographer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0b0b;
    --text: #eee;
    --text-muted: #888;
    --blue: #3b82f6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    background: rgba(10,10,10,0.6);
    backdrop-filter: blur(16px);
    padding: 12px 24px;
    border-radius: 50px;
    z-index: 999;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 10%;
}

/* ROLE */
.role {
    color: var(--blue);
    letter-spacing: 4px;
    font-size: 12px;
    margin-bottom: 30px;
}

/* TYPEWRITER AREA */
.typewriter-text {
    font-size: 2rem;
    max-width: 800px;
    line-height: 1.6;
}

/* CURSOR */
.cursor {
    display: inline-block;
    width: 2px;
    height: 20px;
    background: white;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
}

/* FOOT INFO */
.info {
    margin-top: 60px;
    display: flex;
    gap: 40px;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-muted);
}
</style>
</head>

<body>

<nav>
    <a href="commercial.html">Commercial</a>
    <a href="narrative.html">Narrative</a>
    <a href="documentary.html">Documentary</a>
</nav>

<section class="hero">

    <div class="role">DIRECTOR & CINEMATOGRAPHER</div>

    <!-- INTRO TEXT -->
    <div class="typewriter-text">
        <div id="typewriter"></div>
        <span class="cursor"></span>
    </div>

    <!-- INFO -->
    <div class="info">
        <div>📍 MUMBAI / ARARIA</div>
        <div>🎬 FILMMAKER</div>
        <div style="color: var(--blue);">LET'S TALK →</div>
    </div>

</section>

<script>
const lines = [
    "Hi, I am Adil.",
    "A failed human turned into a filmmaker.",
    "I've always wanted to show all my emotions through visuals.",
    "This is where it all lives."
];

let currentLine = 0;

function showNextLine() {
    if (currentLine < lines.length) {
        const container = document.getElementById("typewriter");

        const line = document.createElement("div");
        line.style.opacity = "0";
        line.style.transform = "translateY(10px)";
        line.style.transition = "0.6s ease";

        line.innerText = lines[currentLine];
        container.appendChild(line);

        setTimeout(() => {
            line.style.opacity = "1";
            line.style.transform = "translateY(0)";
        }, 50);

        currentLine++;
        setTimeout(showNextLine, 800);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    showNextLine();
});
</script>

</body>
</html>
